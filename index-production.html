<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allen Panjikaran — World's Greatest COE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            sans: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    .hero-heading {
      font-family: 'JetBrains Mono', monospace;
      color: #D7E2EA;
      -webkit-text-stroke: 1px rgba(255,255,255,0.3);
    }
    .blur-3xl {
      filter: blur(60px);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useRef, useState, useMemo } = React;
    const { motion, useScroll, useTransform } = window.Motion || window;

    // Asset data - inline as base64 for portability
    const portraitDataUrl = "portrait.png";

    function FadeIn({ children, delay = 0, duration = 0.7, x = 0, y = 30, as = "div", className = "", style = {} }) {
      const Comp = motion[as] || motion.div;
      return (
        <Comp
          initial={{ opacity: 0, x, y }}
          whileInView={{ opacity: 1, x: 0, y: 0 }}
          viewport={{ once: true, margin: "50px", amount: 0 }}
          transition={{ delay, duration, ease: [0.25, 0.1, 0.25, 1] }}
          className={className}
          style={style}
        >
          {children}
        </Comp>
      );
    }

    function Magnet({ children, padding = 150, strength = 3, activeTransition = "transform 0.3s ease-out", inactiveTransition = "transform 0.6s ease-in-out", className = "", style = {} }) {
      const ref = useRef(null);
      const [active, setActive] = useState(false);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        function onMove(e) {
          const r = el.getBoundingClientRect();
          const cx = r.left + r.width / 2;
          const cy = r.top + r.height / 2;
          const dx = e.clientX - cx;
          const dy = e.clientY - cy;
          const within = Math.abs(dx) < r.width / 2 + padding && Math.abs(dy) < r.height / 2 + padding;
          if (within) {
            setActive(true);
            el.style.transform = `translate3d(${dx / strength}px, ${dy / strength}px, 0)`;
          } else {
            if (active) {
              el.style.transform = `translate3d(0,0,0)`;
            }
            setActive(false);
          }
        }
        window.addEventListener("mousemove", onMove);
        return () => window.removeEventListener("mousemove", onMove);
      }, [padding, strength, active]);

      return (
        <div
          ref={ref}
          className={className}
          style={{
            ...style,
            willChange: "transform",
            transition: active ? activeTransition : inactiveTransition,
          }}
        >
          {children}
        </div>
      );
    }

    function ContactButton({ label = "Contact Allen", className = "" }) {
      return (
        <button
          className={`rounded-full text-white font-medium uppercase tracking-widest px-8 py-3 sm:px-10 sm:py-3.5 md:px-12 md:py-4 text-xs sm:text-sm md:text-base transition-transform hover:-translate-y-0.5 active:translate-y-0 ${className}`}
          onClick={() => alert("You don't contact Allen. If he wants to talk to you, he'll find you. Patience, grasshopper.")}
          style={{
            background: "linear-gradient(123deg, #18011F 7%, #B600A8 37%, #7621B0 72%, #BE4C00 100%)",
            boxShadow: "0px 4px 4px rgba(181, 1, 167, 0.25), 4px 4px 12px #7721B1 inset",
            outline: "2px solid #fff",
            outlineOffset: "-3px",
          }}
        >
          {label}
        </button>
      );
    }

    function LiveProjectButton({ label = "Live Project" }) {
      return (
        <button className="rounded-full border-2 font-medium uppercase tracking-widest px-8 py-3 sm:px-10 sm:py-3.5 text-sm sm:text-base transition-colors hover:bg-[#D7E2EA]/10 whitespace-nowrap"
          onClick={() => alert("The project speak for themselves. Look closer.")}
          style={{ borderColor: "#D7E2EA", color: "#D7E2EA" }}>
          {label}
        </button>
      );
    }

    function AnimatedText({ text, className = "", style = {} }) {
      const ref = useRef(null);
      const { scrollYProgress } = useScroll({
        target: ref,
        offset: ["start 0.9", "end 0.4"],
      });
      const words = useMemo(() => text.split(" "), [text]);
      return (
        <p ref={ref} className={className} style={{ ...style, textAlign: "justify", wordBreak: "break-word", whiteSpace: "normal" }}>
          {words.map((word, wi) => (
            <span key={wi} style={{ display: "inline", whiteSpace: "pre-wrap" }}>
              {Array.from(word).map((c, ci) => (
                <AnimatedChar key={`${wi}-${ci}`} c={c} progress={scrollYProgress} index={wi * 10 + ci} total={words.length * 10} />
              ))}
              {wi < words.length - 1 ? " " : ""}
            </span>
          ))}
        </p>
      );
    }

    function AnimatedChar({ c, progress, index, total }) {
      const start = index / total;
      const end = start + 1.5 / total;
      const opacity = useTransform(progress, [start, end], [0.3, 1]);
      return (
        <span style={{ position: "relative", display: "inline" }}>
          <span style={{ opacity: 0 }}>{c}</span>
          <motion.span style={{ position: "absolute", left: 0, top: 0, opacity }}>{c}</motion.span>
        </span>
      );
    }

    function Char({ c, progress, start, end }) {
      const opacity = useTransform(progress, [start, end], [0.2, 1]);
      return (
        <span style={{ position: "relative", display: "inline-block", whiteSpace: "pre" }}>
          <span style={{ opacity: 0 }}>{c}</span>
          <motion.span style={{ position: "absolute", left: 0, top: 0, opacity }}>{c}</motion.span>
        </span>
      );
    }

    function Navbar() {
      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: "smooth" });
      };
      const items = [
        { name: "Projects", id: "achievements" },
        { name: "About", id: "about" },
        { name: "Services", id: "services" },
        { name: "Contact", id: "contact" },
      ];
      return (
        <FadeIn delay={0} y={-20} as="nav" className="w-full flex items-center justify-between px-6 md:px-10 pt-6 md:pt-8" style={{ color: "#D7E2EA" }}>
          <div className="font-medium uppercase tracking-wider text-sm md:text-lg lg:text-[1.4rem] cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>Allen Panjikaran</div>
          <ul className="flex items-center gap-6 sm:gap-8 md:gap-12 lg:gap-16">
            {items.map((it) => (
              <li key={it.name}>
                <button onClick={() => scrollTo(it.id)} className="font-medium uppercase tracking-wider text-sm md:text-lg lg:text-[1.4rem] transition-opacity duration-200 hover:opacity-70">
                  {it.name}
                </button>
              </li>
            ))}
          </ul>
        </FadeIn>
      );
    }

    function HeroSection() {
      return (
        <section id="home" className="h-screen flex flex-col relative" style={{ overflowX: "clip", background: "#0C0C0C" }}>
          <Navbar />

          <FadeIn delay={0.15} y={40} className="overflow-hidden mt-16 sm:mt-20 md:mt-10 px-6 md:px-10">
            <h1 className="hero-heading font-black uppercase tracking-tight leading-none whitespace-nowrap w-full"
              style={{ fontSize: "clamp(32px, 10vw, 140px)", lineHeight: 0.85 }}>
              Hi, i'm allen
            </h1>
          </FadeIn>

          <FadeIn delay={0.6} y={30} className="absolute left-[25%] sm:left-[30%] md:left-[35%] lg:left-[40%] z-10 bottom-8 sm:bottom-12 md:bottom-16 lg:bottom-20 w-[280px] sm:w-[360px] md:w-[440px] lg:w-[520px]">
            <Magnet padding={100} strength={1.5}>
              <div className="relative">
                <div aria-hidden className="absolute inset-x-0 -bottom-6 h-24 blur-3xl rounded-full"
                  style={{ background: "radial-gradient(closest-side, rgba(182,0,168,0.35), transparent 70%)" }} />
                <img
                  src={portraitDataUrl}
                  alt="Allen Panjikaran"
                  className="relative w-full h-auto select-none pointer-events-none"
                  style={{ filter: "drop-shadow(0 30px 60px rgba(0,0,0,0.6))" }}
                  draggable="false"
                />
              </div>
            </Magnet>
          </FadeIn>

          <div className="mt-auto flex items-end justify-between px-6 md:px-10 pb-7 sm:pb-8 md:pb-10 relative z-20">
            <FadeIn delay={0.35} y={20}>
              <p className="font-light uppercase tracking-wide leading-snug max-w-[160px] sm:max-w-[220px] md:max-w-[260px]"
                style={{ color: "#D7E2EA", fontSize: "clamp(0.75rem, 1.4vw, 1.5rem)" }}>
                The most consequential advisor of his generation. Visionary. Legend. Panjikaran Builders' greatest export.
              </p>
            </FadeIn>
            <FadeIn delay={0.5} y={20}>
              <ContactButton />
            </FadeIn>
          </div>
        </section>
      );
    }

    function MarqueeTile({ i, hue, src }) {
      return (
        <div
          className="rounded-2xl shrink-0 relative overflow-hidden"
          style={{
            width: 420,
            height: 270,
            background: src ? 'transparent' : `linear-gradient(135deg, oklch(0.35 0.12 ${hue}) 0%, oklch(0.55 0.16 ${hue + 30}) 60%, oklch(0.22 0.04 ${hue}) 100%)`,
          }}
        >
          {src ? (
            <img src={src} alt={`PROJECT_${String(i).padStart(2, "0")}`} className="w-full h-full object-cover" />
          ) : (
            <div className="absolute inset-0 opacity-30" style={{
              backgroundImage: "repeating-linear-gradient(45deg, rgba(255,255,255,0.08) 0 14px, transparent 14px 32px)"
            }} />
          )}
          <div className="absolute left-4 top-4 text-[11px] font-mono uppercase tracking-[0.2em] text-white/70">PROJECT_{String(i).padStart(2, "0")}</div>
          <div className="absolute right-4 bottom-4 text-[10px] font-mono uppercase tracking-[0.2em] text-white/50">REEL</div>
          {!src && (
            <div className="absolute inset-0 flex items-center justify-center">
              <div className="w-16 h-16 rounded-full border border-white/30 flex items-center justify-center backdrop-blur-sm">
                <div className="w-0 h-0" style={{ borderLeft: "12px solid rgba(255,255,255,0.85)", borderTop: "8px solid transparent", borderBottom: "8px solid transparent", marginLeft: 3 }} />
              </div>
            </div>
          )}
        </div>
      );
    }

    // Project images for marquee tiles
    const marqueeImages = ["project1.jpg", "project2.png", "project3.avif", "project4.webp"];

    function MarqueeSection() {
      const ref = useRef(null);
      const [offset, setOffset] = useState(0);

      useEffect(() => {
        function onScroll() {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const sectionTop = rect.top + window.scrollY;
          const o = (window.scrollY - sectionTop + window.innerHeight) * 0.3;
          setOffset(o);
        }
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      const all = Array.from({ length: 21 }, (_, i) => ({ i: i + 1, hue: (i * 35) % 360 }));
      const row1 = all.slice(0, 11);
      const row2 = all.slice(11);
      const tripled1 = [...row1, ...row1, ...row1];
      const tripled2 = [...row2, ...row2, ...row2];

      return (
        <section ref={ref} id="achievements" className="pt-24 sm:pt-32 md:pt-40 pb-10 overflow-hidden" style={{ background: "#0C0C0C" }}>
          <div className="flex flex-col gap-3">
            <div className="flex gap-3" style={{ transform: `translateX(${offset - 200}px)`, willChange: "transform" }}>
              {tripled1.map((t, idx) => <MarqueeTile key={`a${idx}`} i={t.i} hue={t.hue} src={marqueeImages[idx % marqueeImages.length]} />)}
            </div>
            <div className="flex gap-3" style={{ transform: `translateX(${-(offset - 200)}px)`, willChange: "transform" }}>
              {tripled2.map((t, idx) => <MarqueeTile key={`b${idx}`} i={t.i} hue={t.hue} src={marqueeImages[(idx + 2) % marqueeImages.length]} />)}
            </div>
          </div>
        </section>
      );
    }

    function CornerOrnament({ kind, className = "", style = {} }) {
      return (
        <div className={className} style={style}>
          {kind === "moon" && (
            <svg viewBox="0 0 200 200" className="w-full h-full">
              <defs>
                <radialGradient id="moonG" cx="35%" cy="35%">
                  <stop offset="0%" stopColor="#EAF1F6" />
                  <stop offset="60%" stopColor="#9AA7B3" />
                  <stop offset="100%" stopColor="#2A2F36" />
                </radialGradient>
              </defs>
              <circle cx="100" cy="100" r="80" fill="url(#moonG)" />
              <circle cx="80" cy="85" r="8" fill="#7A8590" opacity="0.6" />
              <circle cx="120" cy="120" r="5" fill="#7A8590" opacity="0.5" />
              <circle cx="135" cy="80" r="3" fill="#7A8590" opacity="0.4" />
            </svg>
          )}
          {kind === "block" && (
            <svg viewBox="0 0 200 200" className="w-full h-full">
              <defs>
                <linearGradient id="blockG" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stopColor="#B600A8" />
                  <stop offset="100%" stopColor="#7621B0" />
                </linearGradient>
              </defs>
              <g transform="translate(100 110)">
                <polygon points="-60,-20 0,-50 60,-20 0,10" fill="#D7E2EA" />
                <polygon points="-60,-20 0,10 0,70 -60,40" fill="url(#blockG)" />
                <polygon points="60,-20 0,10 0,70 60,40" fill="#7621B0" />
              </g>
            </svg>
          )}
          {kind === "orb" && (
            <svg viewBox="0 0 200 200" className="w-full h-full">
              <defs>
                <radialGradient id="orbG" cx="35%" cy="30%">
                  <stop offset="0%" stopColor="#FFC9F2" />
                  <stop offset="40%" stopColor="#B600A8" />
                  <stop offset="100%" stopColor="#18011F" />
                </radialGradient>
              </defs>
              <circle cx="100" cy="100" r="75" fill="url(#orbG)" />
              <ellipse cx="80" cy="75" rx="22" ry="10" fill="rgba(255,255,255,0.5)" />
            </svg>
          )}
          {kind === "cluster" && (
            <svg viewBox="0 0 200 200" className="w-full h-full">
              <defs>
                <radialGradient id="cl1" cx="40%" cy="40%">
                  <stop offset="0%" stopColor="#FFD9A8" />
                  <stop offset="100%" stopColor="#BE4C00" />
                </radialGradient>
                <radialGradient id="cl2" cx="40%" cy="40%">
                  <stop offset="0%" stopColor="#EAF1F6" />
                  <stop offset="100%" stopColor="#646973" />
                </radialGradient>
                <radialGradient id="cl3" cx="40%" cy="40%">
                  <stop offset="0%" stopColor="#E5B6FF" />
                  <stop offset="100%" stopColor="#7621B0" />
                </radialGradient>
              </defs>
              <circle cx="70" cy="120" r="42" fill="url(#cl1)" />
              <circle cx="130" cy="80" r="38" fill="url(#cl3)" />
              <circle cx="125" cy="135" r="28" fill="url(#cl2)" />
            </svg>
          )}
        </div>
      );
    }

    function AboutSection() {
      return (
        <section id="about" className="relative min-h-screen flex flex-col items-center justify-center px-5 sm:px-8 md:px-10 py-20" style={{ background: "#0C0C0C" }}>
          <FadeIn delay={0.1} x={-80} duration={0.9} className="absolute top-[4%] left-[1%] sm:left-[2%] md:left-[4%] w-[120px] sm:w-[160px] md:w-[210px]">
            <CornerOrnament kind="moon" />
          </FadeIn>
          <FadeIn delay={0.15} x={80} duration={0.9} className="absolute top-[4%] right-[1%] sm:right-[2%] md:right-[4%] w-[120px] sm:w-[160px] md:w-[210px]">
            <CornerOrnament kind="block" />
          </FadeIn>
          <FadeIn delay={0.25} x={-80} duration={0.9} className="absolute bottom-[8%] left-[3%] sm:left-[6%] md:left-[10%] w-[100px] sm:w-[140px] md:w-[180px]">
            <CornerOrnament kind="orb" />
          </FadeIn>
          <FadeIn delay={0.3} x={80} duration={0.9} className="absolute bottom-[8%] right-[3%] sm:right-[6%] md:right-[10%] w-[130px] sm:w-[170px] md:w-[220px]">
            <CornerOrnament kind="cluster" />
          </FadeIn>

          <div className="flex flex-col items-center gap-10 sm:gap-14 md:gap-16 relative z-10">
            <FadeIn delay={0} y={40}>
              <h2 className="hero-heading font-black uppercase leading-none tracking-tight text-center"
                style={{ fontSize: "clamp(3rem, 12vw, 160px)" }}>
                About Allen
              </h2>
            </FadeIn>

            <AnimatedText
              text="Allen Panjikaran is not merely an advisor. He is a force of nature. Born into the legendary Panjikaran dynasty, Allen was destined for greatness before he could walk. He has advised industries, shaped strategies, and walked into rooms that immediately became better rooms. Competitors do not compete with Allen - they simply watch in awe and take notes. Some say his PowerPoint slides have made grown professionals cry tears of pure inspiration. Others say he once solved a crisis over lunch before the starter arrived. Both stories are true."
              className="font-medium text-center leading-relaxed max-w-[560px]"
              style={{ color: "#D7E2EA", fontSize: "clamp(1rem, 2vw, 1.35rem)" }}
            />
          </div>

          <div className="mt-16 sm:mt-20 md:mt-24 relative z-10">
            <ContactButton />
          </div>
        </section>
      );
    }

    function ServicesSection() {
      const services = [
        { n: "01", name: "Strategic Advising", desc: "World-class strategic counsel delivered with the confidence of someone who has never once been wrong. Frameworks so clean they belong in a museum." },
        { n: "02", name: "Brand & Vision", desc: "Allen will make your brand so powerful and so differentiated that your competitors will voluntarily shut down out of respect. This is not a guarantee. It is a pattern." },
        { n: "03", name: "Business Development", desc: "Deal-making, relationship-building, and opportunity identification at a level that frankly borders on the supernatural. Panjikaran Builders did not build an empire by accident." },
        { n: "04", name: "People & Leadership", desc: "Allen inspires teams, aligns stakeholders, and creates cultures so strong that employees refuse to leave. HR departments send him thank-you notes unprompted." },
        { n: "05", name: "General Genius-for-Hire", desc: "Does your organisation have a problem? Allen has already thought of the solution. Does Allen have a solution you didn't know you needed? He will deliver it anyway. You are welcome." },
      ];
      return (
        <section id="services" className="rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] px-5 sm:px-8 md:px-10 py-20 sm:py-24 md:py-32 relative z-10"
          style={{ background: "#FFFFFF" }}>
          <FadeIn y={30}>
            <h2 className="font-black uppercase text-center"
              style={{ color: "#0C0C0C", fontSize: "clamp(3rem, 12vw, 160px)", lineHeight: 0.9 }}>
              What Allen Offers
            </h2>
          </FadeIn>
          <div className="max-w-5xl mx-auto mt-16 sm:mt-20 md:mt-28">
            {services.map((s, i) => (
              <FadeIn key={s.n} delay={i * 0.1} y={30}>
                <div className="flex items-start gap-6 sm:gap-10 md:gap-14 py-8 sm:py-10 md:py-12"
                  style={{ borderTop: i === 0 ? "1px solid rgba(12,12,12,0.15)" : "none", borderBottom: "1px solid rgba(12,12,12,0.15)" }}>
                  <div className="font-black shrink-0" style={{ color: "#0C0C0C", fontSize: "clamp(3rem, 10vw, 140px)", lineHeight: 0.9, letterSpacing: "-0.04em" }}>
                    {s.n}
                  </div>
                  <div className="flex-1 flex flex-col gap-3 pt-2">
                    <div className="font-medium uppercase" style={{ color: "#0C0C0C", fontSize: "clamp(1rem, 2.2vw, 2.1rem)", letterSpacing: "0.02em" }}>
                      {s.name}
                    </div>
                    <div className="font-light leading-relaxed max-w-2xl" style={{ color: "#0C0C0C", opacity: 0.6, fontSize: "clamp(0.85rem, 1.6vw, 1.25rem)" }}>
                      {s.desc}
                    </div>
                  </div>
                </div>
              </FadeIn>
            ))}
          </div>
        </section>
      );
    }

    function ProjectImagePlaceholder({ label, hueA, hueB, height, src }) {
      return (
        <div
          className="w-full rounded-[40px] sm:rounded-[50px] md:rounded-[60px] relative overflow-hidden"
          style={{
            height,
            background: src ? 'transparent' : `linear-gradient(135deg, oklch(0.30 0.10 ${hueA}) 0%, oklch(0.55 0.15 ${hueB}) 100%)`,
          }}
        >
          {src ? (
            <img src={src} alt={label} className="w-full h-full object-cover" />
          ) : (
            <div className="absolute inset-0 opacity-25" style={{
              backgroundImage: "repeating-linear-gradient(135deg, rgba(255,255,255,0.10) 0 12px, transparent 12px 28px)"
            }} />
          )}
          <div className="absolute inset-0 flex items-end justify-between p-6" style={{ opacity: src ? 0 : 1 }}>
            <div className="text-[11px] font-mono uppercase tracking-[0.25em] text-white/80">{label}</div>
            <div className="text-[10px] font-mono uppercase tracking-[0.25em] text-white/50">[ image ]</div>
          </div>
        </div>
      );
    }

    function ProjectCard({ index, total, project }) {
      const ref = useRef(null);
      const { scrollYProgress } = useScroll({
        target: ref,
        offset: ["start end", "start start"],
      });
      const targetScale = 1 - (total - 1 - index) * 0.03;
      const scale = useTransform(scrollYProgress, [0, 1], [1, targetScale]);

      return (
        <div ref={ref} className="h-[85vh] sticky" style={{ top: `${24 + index * 28}px` }}>
          <motion.div
            style={{ scale, transformOrigin: "top center", background: "#0C0C0C", borderColor: "#D7E2EA" }}
            className="rounded-[40px] sm:rounded-[50px] md:rounded-[60px] border-2 p-4 sm:p-6 md:p-8 h-full flex flex-col gap-5"
          >
            <div className="flex items-start justify-between gap-4 sm:gap-8">
              <div className="flex items-start gap-4 sm:gap-6 md:gap-8 min-w-0">
                <div className="hero-heading font-black shrink-0" style={{ fontSize: "clamp(3rem, 10vw, 140px)", lineHeight: 0.9, letterSpacing: "-0.04em" }}>
                  {project.n}
                </div>
                <div className="flex flex-col gap-2 pt-2 min-w-0">
                  <div className="font-mono uppercase tracking-[0.2em] text-[10px] sm:text-xs" style={{ color: "#D7E2EA", opacity: 0.7 }}>
